<!DOCTYPE html>
<html>
<head>
    <title>E-Arcade Portal</title>
    <style>
        body { background: #111; color: #ff00ff; text-align: center; font-family: monospace; }
        canvas { border: 4px solid #00ffff; background: #000; cursor: none; box-shadow: 0 0 20px #00ffff; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #ff00ff; color: white; border: none; margin: 5px; border-radius: 5px; box-shadow: 0 0 10px #ff00ff; }
        button:hover { box-shadow: 0 0 20px #ff00ff; }
        #soundToggle { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        #soundToggle:hover { box-shadow: 0 0 20px #00ff00; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>E-ARCADE PORTAL</h1>
        <button onclick="launchGame()">START E-ARCADE</button>
        <br>
        <button id="soundToggle" onclick="toggleSound()">🔊 SOUND ON</button>
    </div>

    <div id="gameContainer" style="display: none;">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <br>
        <button id="soundToggleInGame" onclick="toggleSound()">🔊 SOUND ON</button>
        <button onclick="location.reload()">QUIT TO MENU</button>
    </div>

    <script>
        let soundEnabled = true;
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // Sound effect generator
        const sounds = {
            brickHit: () => playTone(600, 100, 0.3),
            paddleHit: () => playTone(800, 100, 0.3),
            levelComplete: () => playMelody([800, 1000, 1200], 150),
            lifeLost: () => playTone(300, 300, 0.5),
            gameOver: () => playMelody([600, 400, 200], 200)
        };

        function playTone(freq, duration, volume) {
            if (!soundEnabled) return;
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            oscillator.connect(gain);
            gain.connect(audioContext.destination);
            
            oscillator.frequency.value = freq;
            oscillator.type = 'sine';
            
            gain.gain.setValueAtTime(volume, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration / 1000);
        }

        function playMelody(frequencies, noteDuration) {
            if (!soundEnabled) return;
            let time = audioContext.currentTime;
            
            frequencies.forEach(freq => {
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                gain.gain.setValueAtTime(0.3, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + noteDuration / 1000);
                
                oscillator.start(time);
                oscillator.stop(time + noteDuration / 1000);
                
                time += noteDuration / 1000;
            });
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundToggle') || document.getElementById('soundToggleInGame');
            btn.textContent = soundEnabled ? '🔊 SOUND ON' : '🔇 SOUND OFF';
            if (document.getElementById('soundToggleInGame')) {
                document.getElementById('soundToggleInGame').textContent = soundEnabled ? '🔊 SOUND ON' : '🔇 SOUND OFF';
            }
        }

        function launchGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            startEngine();
        }

        function startEngine() {
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");

            // Game constants
            const BRICK_COLS = 5;
            const BRICK_HEIGHT = 15;
            const BRICK_PADDING = 5;
            const BRICK_OFFSET_TOP = 30;

            let paddleX = 150, ballX = 200, ballY = 330, speedX = 4, speedY = -4, score = 0, lives = 3;
            let bricks = [];
            let level = 1;
            let respawnDelay = 0;
            let isRespawning = false;
            let particles = [];
            let flashIntensity = 0;

            // Particle system
            class Particle {
                constructor(x, y, vx, vy, color) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.color = color;
                    this.life = 30;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.2; // gravity
                    this.life--;
                }

                draw(ctx) {
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.life / 30;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            // Initialize bricks with level variations
            function initBricks() {
                bricks = [];
                const BRICK_ROWS = 3 + level;
                const BRICK_WIDTH = level > 3 ? 60 : 70;
                
                for (let row = 0; row < BRICK_ROWS; row++) {
                    for (let col = 0; col < BRICK_COLS; col++) {
                        if (level > 2 && (row + col) % 3 === 0) continue;
                        
                        bricks.push({
                            x: col * (BRICK_WIDTH + BRICK_PADDING) + 10,
                            y: row * (BRICK_HEIGHT + BRICK_PADDING) + BRICK_OFFSET_TOP,
                            width: BRICK_WIDTH,
                            height: BRICK_HEIGHT,
                            active: true,
                            row: row
                        });
                    }
                }
            }

            initBricks();

            canvas.addEventListener("mousemove", (e) => {
                let rect = canvas.getBoundingClientRect();
                paddleX = e.clientX - rect.left - 50;
                paddleX = Math.max(0, Math.min(paddleX, 300));
            });

            function createParticles(x, y, color, count = 8) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count;
                    const speed = 2 + Math.random() * 3;
                    particles.push(new Particle(
                        x,
                        y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        color
                    ));
                }
            }

            function checkBrickCollision() {
                for (let brick of bricks) {
                    if (!brick.active) continue;

                    if (ballX > brick.x && ballX < brick.x + brick.width &&
                        ballY > brick.y && ballY < brick.y + brick.height) {
                        brick.active = false;
                        
                        // Simple bounce
                        speedY = -speedY;
                        score += 10;
                        sounds.brickHit();
                        
                        // Create particles
                        const colors = ["#00ff00", "#00ffff", "#ff00ff"];
                        createParticles(ballX, ballY, colors[brick.row % 3], 12);
                        flashIntensity = 0.3;

                        // Check if all bricks are cleared
                        if (bricks.every(b => !b.active)) {
                            level++;
                            sounds.levelComplete();
                            alert("LEVEL " + level + "! Score: " + score);
                            initBricks();
                            ballX = 200;
                            ballY = 330;
                            speedX = 4 * (1 + level * 0.1);
                            speedY = -4 * (1 + level * 0.1);
                            isRespawning = false;
                        }
                        return;
                    }
                }
            }

            function update() {
                ctx.clearRect(0, 0, 400, 400);

                // Handle respawn delay
                if (isRespawning) {
                    respawnDelay--;
                    if (respawnDelay <= 0) {
                        isRespawning = false;
                    }
                }

                if (!isRespawning) {
                    ballX += speedX;
                    ballY += speedY;
                } else {
                    ballY += 1;
                    ballX = 200;
                }

                // Wall collision
                if (ballX < 10 || ballX > 390) speedX = -speedX;
                if (ballY < 10) speedY = -speedY;

                // Paddle collision with angle physics
                if (ballY > 350 && ballY < 370 && ballX > paddleX && ballX < paddleX + 100) {
                    speedY = -Math.abs(speedY);
                    
                    // Angle based on where ball hits paddle
                    const hitPos = (ballX - paddleX) / 100; // 0 to 1
                    const angle = (hitPos - 0.5) * 1; // Range: -0.5 to 0.5
                    speedX = angle * 8;
                    
                    score++;
                    sounds.paddleHit();
                    createParticles(ballX, ballY, "#00ffff", 6);
                    flashIntensity = 0.2;
                    
                    if (score % 5 === 0) { speedX *= 1.05; speedY *= 1.05; }
                }

                // Brick collision
                if (!isRespawning) {
                    checkBrickCollision();
                }

                // Fall off screen
                if (ballY > 400) {
                    lives--;
                    sounds.lifeLost();
                    ballX = 200;
                    ballY = 50;
                    respawnDelay = 120;
                    isRespawning = true;
                    if (lives === 0) {
                        sounds.gameOver();
                        alert("GAME OVER!\nFinal Score: " + score + "\nLevel Reached: " + level);
                        location.reload();
                    }
                }

                // Update particles
                particles = particles.filter(p => p.life > 0);
                particles.forEach(p => p.update());

                // Draw flash
                if (flashIntensity > 0) {
                    ctx.fillStyle = `rgba(255, 0, 255, ${flashIntensity * 0.3})`;
                    ctx.fillRect(0, 0, 400, 400);
                    flashIntensity -= 0.05;
                }

                // Draw bricks with gradients
                for (let brick of bricks) {
                    if (brick.active) {
                        const gradient = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.height);
                        
                        const colors = [
                            ["#00ff00", "#00cc00"],
                            ["#00ffff", "#00cccc"],
                            ["#ff00ff", "#cc00cc"]
                        ];
                        const colorPair = colors[brick.row % 3];
                        
                        gradient.addColorStop(0, colorPair[0]);
                        gradient.addColorStop(1, colorPair[1]);
                        
                        ctx.fillStyle = gradient;
                        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                        
                        ctx.strokeStyle = "#ffffff";
                        ctx.lineWidth = 1;
                        ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
                    }
                }

                // Draw paddle with gradient
                const paddleGradient = ctx.createLinearGradient(paddleX, 360, paddleX, 380);
                paddleGradient.addColorStop(0, "#00ffff");
                paddleGradient.addColorStop(1, "#0088ff");
                ctx.fillStyle = paddleGradient;
                ctx.fillRect(paddleX, 360, 100, 20);
                ctx.shadowColor = "#00ffff";
                ctx.shadowBlur = 15;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.strokeRect(paddleX, 360, 100, 20);

                // Draw ball with glow
                ctx.shadowColor = "#ff00ff";
                ctx.shadowBlur = 20;
                
                // Outer glow
                ctx.fillStyle = "rgba(255, 0, 255, 0.2)";
                ctx.beginPath();
                ctx.arc(ballX, ballY, 20, 0, Math.PI * 2);
                ctx.fill();
                
                // Middle glow
                ctx.fillStyle = "rgba(255, 0, 255, 0.4)";
                ctx.beginPath();
                ctx.arc(ballX, ballY, 15, 0, Math.PI * 2);
                ctx.fill();
                
                // Core ball
                ctx.fillStyle = "#ff00ff";
                ctx.beginPath();
                ctx.arc(ballX, ballY, 10, 0, Math.PI * 2);
                ctx.fill();
                
                // Highlight
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.arc(ballX - 3, ballY - 3, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowColor = "transparent";
                ctx.shadowBlur = 0;

                // Draw particles
                particles.forEach(p => p.draw(ctx));

                // Draw UI
                ctx.fillStyle = "#ff00ff";
                ctx.font = "bold 20px Arial";
                ctx.shadowColor = "#ff00ff";
                ctx.shadowBlur = 10;
                ctx.fillText("Score: " + score, 10, 30);
                ctx.fillText("Lives: " + lives, 300, 30);
                ctx.fillText("Level: " + level, 175, 30);
                ctx.shadowColor = "transparent";

                // Draw respawn message
                if (isRespawning) {
                    ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
                    ctx.fillRect(0, 0, 400, 400);
                    ctx.fillStyle = "#ff00ff";
                    ctx.font = "bold 30px Arial";
                    ctx.shadowColor = "#ff00ff";
                    ctx.shadowBlur = 15;
                    ctx.fillText("GET READY!", 120, 200);
                    ctx.shadowColor = "transparent";
                }

                requestAnimationFrame(update);
            }
            update();
        }
    </script>
</body>
</html>
