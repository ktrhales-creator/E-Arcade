<!DOCTYPE html>
<html>
<head>
    <title>CYBER SHATTER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 100;
        }

        .grid-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(255, 0, 255, 0.1) 25%, rgba(255, 0, 255, 0.1) 26%, transparent 27%, transparent 74%, rgba(255, 0, 255, 0.1) 75%, rgba(255, 0, 255, 0.1) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, 0.1) 25%, rgba(0, 255, 255, 0.1) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.1) 75%, rgba(0, 255, 255, 0.1) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            animation: gridShift 20s linear infinite;
            z-index: 1;
        }

        @keyframes gridShift {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .arcade-cabinet {
            background: linear-gradient(135deg, #1a1f3a 0%, #0d0f1f 100%);
            border: 15px solid #2a2a2a;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 
                0 0 50px rgba(255, 0, 255, 0.6),
                0 0 100px rgba(0, 255, 255, 0.4),
                inset 0 0 30px rgba(255, 0, 255, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.8);
            max-width: 600px;
            animation: cabinetGlow 3s ease-in-out infinite;
        }

        @keyframes cabinetGlow {
            0%, 100% { box-shadow: 
                0 0 50px rgba(255, 0, 255, 0.6),
                0 0 100px rgba(0, 255, 255, 0.4),
                inset 0 0 30px rgba(255, 0, 255, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.8);
            }
            50% { box-shadow: 
                0 0 80px rgba(255, 0, 255, 0.8),
                0 0 150px rgba(0, 255, 255, 0.6),
                inset 0 0 40px rgba(255, 0, 255, 0.2),
                0 20px 60px rgba(0, 0, 0, 0.8);
            }
        }

        .screen {
            background: #000;
            border: 3px solid #00ff88;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 
                0 0 30px rgba(0, 255, 136, 0.5),
                inset 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 3px;
            animation: titleGlow 2s ease-in-out infinite;
            text-shadow: 
                0 0 10px rgba(255, 0, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.6);
            color: #ff00ff;
        }

        @keyframes titleGlow {
            0%, 100% { 
                text-shadow: 
                    0 0 10px rgba(255, 0, 255, 0.8),
                    0 0 20px rgba(0, 255, 255, 0.6);
            }
            50% { 
                text-shadow: 
                    0 0 20px rgba(255, 0, 255, 1),
                    0 0 40px rgba(0, 255, 255, 0.8),
                    0 0 60px rgba(255, 255, 0, 0.6);
            }
        }

        .subtitle {
            font-size: 16px;
            color: #00ffff;
            margin-bottom: 5px;
            letter-spacing: 2px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .status-text {
            font-size: 12px;
            color: #00ff88;
            margin-top: 10px;
            animation: blink 1s step-start infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 35px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #ff00ff;
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.2), rgba(0, 255, 255, 0.2));
            color: #ff00ff;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 20px rgba(255, 0, 255, 0.5),
                inset 0 0 10px rgba(255, 0, 255, 0.1);
            border-radius: 5px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        button:hover {
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.5), rgba(0, 255, 255, 0.5));
            box-shadow: 
                0 0 40px rgba(255, 0, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.6),
                inset 0 0 20px rgba(255, 0, 255, 0.3);
            transform: scale(1.05);
            border-color: #00ffff;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: scale(0.98);
            box-shadow: 
                0 0 20px rgba(255, 0, 255, 0.5),
                inset 0 0 30px rgba(255, 0, 255, 0.3);
        }

        #soundToggle {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 255, 200, 0.2));
            border-color: #00ff88;
            color: #00ff88;
        }

        #soundToggle:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.5), rgba(0, 255, 200, 0.5));
            border-color: #00ffff;
            color: #00ffff;
            box-shadow: 
                0 0 40px rgba(0, 255, 136, 0.8),
                0 0 20px rgba(0, 255, 200, 0.6),
                inset 0 0 20px rgba(0, 255, 136, 0.3);
        }

        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        canvas {
            display: block;
            border: 5px solid #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.7);
            background: #000;
        }

        .game-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 21;
        }

        .marquee {
            font-size: 14px;
            color: #ffff00;
            margin-top: 15px;
            letter-spacing: 1px;
            animation: marqueeScroll 4s linear infinite;
        }

        @keyframes marqueeScroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 5;
        }

        .retro-bezel {
            background: linear-gradient(145deg, #3a3a3a, #1a1a1a);
            border: 8px outset #4a4a4a;
            border-right-color: #0a0a0a;
            border-bottom-color: #0a0a0a;
        }
    </style>
</head>
<body>
    <div class="grid-background"></div>

    <div id="menu" class="container">
        <div class="arcade-cabinet retro-bezel">
            <div class="screen">
                <div class="title">CYBER SHATTER</div>
                <div class="subtitle">▼ PORTAL ▼</div>
                <div class="status-text">[ READY TO START ]</div>
                <div class="marquee">★ INSERT COIN TO CONTINUE ★</div>
            </div>

            <div class="button-group">
                <button onclick="launchGame()">▶ START GAME</button>
                <button id="soundToggle" onclick="toggleSound()">🔊 SOUND ON</button>
            </div>
        </div>
    </div>

    <div id="gameContainer" style="display: none;">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-ui">
            <button id="soundToggleInGame" onclick="toggleSound()">🔊</button>
            <button onclick="location.reload()">⏹ QUIT</button>
        </div>
    </div>

    <script>
        let soundEnabled = true;
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * window.innerWidth + 'px';
            particle.style.top = '-10px';
            particle.style.width = '2px';
            particle.style.height = '2px';
            particle.style.background = Math.random() > 0.5 ? '#ff00ff' : '#00ffff';
            particle.style.boxShadow = '0 0 10px currentColor';
            
            document.body.appendChild(particle);
            
            let y = -10;
            const speed = Math.random() * 1 + 0.5;
            const interval = setInterval(() => {
                y += speed;
                particle.style.top = y + 'px';
                particle.style.opacity = 1 - (y / window.innerHeight);
                
                if (y > window.innerHeight) {
                    clearInterval(interval);
                    particle.remove();
                }
            }, 30);
        }

        setInterval(createParticle, 300);

        const sounds = {
            brickHit: () => playTone(600, 100, 0.3),
            paddleHit: () => playTone(800, 100, 0.3),
            levelComplete: () => playMelody([800, 1000, 1200], 150),
            lifeLost: () => playTone(300, 300, 0.5),
            gameOver: () => playMelody([600, 400, 200], 200),
            powerUp: () => playMelody([1000, 1200, 1000], 100)
        };

        function playTone(freq, duration, volume) {
            if (!soundEnabled) return;
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            oscillator.connect(gain);
            gain.connect(audioContext.destination);
            
            oscillator.frequency.value = freq;
            oscillator.type = 'sine';
            
            gain.gain.setValueAtTime(volume, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration / 1000);
        }

        function playMelody(frequencies, noteDuration) {
            if (!soundEnabled) return;
            let time = audioContext.currentTime;
            
            frequencies.forEach(freq => {
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                gain.gain.setValueAtTime(0.3, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + noteDuration / 1000);
                
                oscillator.start(time);
                oscillator.stop(time + noteDuration / 1000);
                
                time += noteDuration / 1000;
            });
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundToggle');
            const btnInGame = document.getElementById('soundToggleInGame');
            const text = soundEnabled ? '🔊' : '🔇';
            if (btn) btn.textContent = text + ' SOUND ' + (soundEnabled ? 'ON' : 'OFF');
            if (btnInGame) btnInGame.textContent = text;
        }

        function launchGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'flex';
            startEngine();
        }

        function startEngine() {
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");

            // Game constants
            const BRICK_COLS = 5;
            const BRICK_HEIGHT = 15;
            const BRICK_PADDING = 5;
            const BRICK_OFFSET_TOP = 30;

            // Game state
            let paddleX = 150;
            let ballX = 200;
            let ballY = 330;
            let speedX = 4;
            let speedY = -4;
            let score = 0;
            let lives = 3;
            let bricks = [];
            let level = 1;
            let respawnDelay = 0;
            let isRespawning = false;
            let particles = [];
            let flashIntensity = 0;
            let powerUps = [];
            let balls = [];
            let slowMoActive = 0;
            let shieldActive = false;
            let screenShake = 0;

            // Particle system
            class Particle {
                constructor(x, y, vx, vy, color) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.color = color;
                    this.life = 30;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.2;
                    this.life--;
                }

                draw(ctx) {
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.life / 30;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            // Power-up system
            class PowerUp {
                constructor(x, y, type) {
                    this.x = x;
                    this.y = y;
                    this.type = type;
                    this.width = 15;
                    this.height = 15;
                    this.vy = 2;
                    this.active = true;
                    this.pulse = 0;
                }

                update() {
                    this.y += this.vy;
                    this.pulse += 0.1;
                    if (this.y > 400) this.active = false;
                }

                draw(ctx) {
                    const colors = {
                        'expand': '#ffff00',
                        'multiBall': '#ff0088',
                        'slowMo': '#00ffff',
                        'shield': '#00ff00',
                        'speedBoost': '#ff6600'
                    };

                    ctx.fillStyle = colors[this.type] || '#ffffff';
                    const size = this.width + Math.sin(this.pulse) * 2;
                    ctx.fillRect(this.x - size/2, this.y - size/2, size, size);
                    
                    ctx.shadowColor = colors[this.type];
                    ctx.shadowBlur = 10;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(this.x - size/2, this.y - size/2, size, size);
                    ctx.shadowColor = 'transparent';
                }

                checkCollision(paddleX) {
                    return this.y > 350 && this.y < 380 && this.x > paddleX && this.x < paddleX + 100;
                }
            }

            // Brick types
            class Brick {
                constructor(x, y, width, height, row, type = 'normal') {
                    this.x = x;
                    this.y = y;
                    this.width = width;
                    this.height = height;
                    this.row = row;
                    this.type = type;
                    this.active = true;
                    this.hits = type === 'ice' ? 2 : 1;
                    this.maxHits = this.hits;
                }

                draw(ctx) {
                    if (!this.active) return;

                    const gradient = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
                    
                    let colors;
                    if (this.type === 'ice') {
                        colors = ["#00ddff", "#0099ff"];
                    } else if (this.type === 'bomb') {
                        colors = ["#ff3333", "#cc0000"];
                    } else if (this.type === 'mystery') {
                        colors = ["#dd00ff", "#8800ff"];
                    } else {
                        colors = [["#00ff00", "#00cc00"], ["#00ffff", "#00cccc"], ["#ff00ff", "#cc00cc"]][this.row % 3];
                    }

                    gradient.addColorStop(0, colors[0]);
                    gradient.addColorStop(1, colors[1]);
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    
                    ctx.strokeStyle = "#ffffff";
                    ctx.lineWidth = 1;
                    ctx.strokeRect(this.x, this.y, this.width, this.height);

                    // Draw hit count for ice bricks
                    if (this.type === 'ice' && this.hits > 0) {
                        ctx.fillStyle = '#ffffff';
                        ctx.font = '10px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText(this.hits, this.x + this.width/2, this.y + this.height/2 + 3);
                    }
                }
            }

            function initBricks() {
                bricks = [];
                const BRICK_ROWS = 3 + level;
                const BRICK_WIDTH = level > 3 ? 60 : 70;
                
                for (let row = 0; row < BRICK_ROWS; row++) {
                    for (let col = 0; col < BRICK_COLS; col++) {
                        if (level > 2 && (row + col) % 3 === 0) continue;
                        
                        let type = 'normal';
                        const rand = Math.random();
                        if (rand < 0.15) type = 'ice';
                        if (rand < 0.05) type = 'bomb';
                        if (rand < 0.03) type = 'mystery';
                        
                        bricks.push(new Brick(
                            col * (BRICK_WIDTH + BRICK_PADDING) + 10,
                            row * (BRICK_HEIGHT + BRICK_PADDING) + BRICK_OFFSET_TOP,
                            BRICK_WIDTH,
                            BRICK_HEIGHT,
                            row,
                            type
                        ));
                    }
                }
            }

            initBricks();

            canvas.addEventListener("mousemove", (e) => {
                let rect = canvas.getBoundingClientRect();
                paddleX = e.clientX - rect.left - 50;
                paddleX = Math.max(0, Math.min(paddleX, 300));
            });

            function createParticles(x, y, color, count = 8) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count;
                    const speed = 2 + Math.random() * 3;
                    particles.push(new Particle(
                        x, y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        color
                    ));
                }
            }

            function spawnPowerUp(x, y) {
                const types = ['expand', 'multiBall', 'slowMo', 'shield', 'speedBoost'];
                const type = types[Math.floor(Math.random() * types.length)];
                powerUps.push(new PowerUp(x, y, type));
            }

            function activatePowerUp(type) {
                sounds.powerUp();
                switch(type) {
                    case 'expand':
                        // Paddle expand handled in draw
                        break;
                    case 'multiBall':
                        balls.push({x: ballX, y: ballY, vx: speedX * -1.2, vy: speedY});
                        balls.push({x: ballX, y: ballY, vx: speedX * 1.2, vy: speedY});
                        break;
                    case 'slowMo':
                        slowMoActive = 300;
                        break;
                    case 'shield':
                        shieldActive = true;
                        break;
                    case 'speedBoost':
                        speedX *= 1.5;
                        speedY *= 1.5;
                        break;
                }
            }

            function checkBrickCollision(bx, by, bsx, bsy) {
                for (let brick of bricks) {
                    if (!brick.active) continue;

                    if (bx > brick.x && bx < brick.x + brick.width &&
                        by > brick.y && by < brick.y + brick.height) {
                        
                        brick.hits--;
                        
                        if (brick.hits <= 0) {
                            brick.active = false;
                            score += (brick.type === 'bomb' ? 50 : brick.type === 'ice' ? 20 : 10);
                            
                            const colors = {
                                'ice': '#00ddff',
                                'bomb': '#ff3333',
                                'mystery': '#dd00ff',
                                'normal': ["#00ff00", "#00ffff", "#ff00ff"][brick.row % 3]
                            };
                            
                            createParticles(bx, by, colors[brick.type] || '#00ff00', 12);
                            
                            if (brick.type === 'bomb') {
                                for (let otherBrick of bricks) {
                                    if (otherBrick.active && 
                                        Math.abs(otherBrick.x - brick.x) < 80 &&
                                        Math.abs(otherBrick.y - brick.y) < 60) {
                                        otherBrick.active = false;
                                        score += 10;
                                        createParticles(otherBrick.x + otherBrick.width/2, otherBrick.y + otherBrick.height/2, '#ff3333', 8);
                                    }
                                }
                            }
                            
                            if (Math.random() < 0.3) spawnPowerUp(brick.x + brick.width/2, brick.y + brick.height/2);
                        }

                        bsy = -bsy;
                        sounds.brickHit();
                        flashIntensity = 0.3;
                        screenShake = 5;

                        if (bricks.every(b => !b.active)) {
                            level++;
                            sounds.levelComplete();
                            alert("LEVEL " + level + "! Score: " + score);
                            initBricks();
                            ballX = 200;
                            ballY = 330;
                            speedX = 4 * (1 + level * 0.1);
                            speedY = -4 * (1 + level * 0.1);
                            isRespawning = false;
                            balls = [];
                            slowMoActive = 0;
                            shieldActive = false;
                        }
                        return bsy;
                    }
                }
                return bsy;
            }

            function update() {
                // Apply slow-mo
                let dt = slowMoActive > 0 ? 0.5 : 1;
                if (slowMoActive > 0) slowMoActive--;

                ctx.clearRect(0, 0, 400, 400);

                if (isRespawning) {
                    respawnDelay--;
                    if (respawnDelay <= 0) {
                        isRespawning = false;
                    }
                }

                // Update main ball
                if (!isRespawning) {
                    ballX += speedX * dt;
                    ballY += speedY * dt;
                } else {
                    ballY += 1;
                    ballX = 200;
                }

                // Wall collision
                if (ballX < 10 || ballX > 390) speedX = -speedX;
                if (ballY < 10) speedY = -speedY;

                // Paddle collision
                const paddleWidth = shieldActive ? 120 : 100;
                if (ballY > 350 && ballY < 370 && ballX > paddleX && ballX < paddleX + paddleWidth) {
                    speedY = -Math.abs(speedY);
                    const hitPos = (ballX - paddleX) / paddleWidth;
                    const angle = (hitPos - 0.5) * 1;
                    speedX = angle * 8;
                    
                    score++;
                    sounds.paddleHit();
                    createParticles(ballX, ballY, "#00ffff", 6);
                    flashIntensity = 0.2;
                    
                    if (score % 5 === 0) { speedX *= 1.05; speedY *= 1.05; }
                }

                // Brick collision
                if (!isRespawning) {
                    speedY = checkBrickCollision(ballX, ballY, speedX, speedY);
                }

                // Fall off screen
                if (ballY > 400) {
                    if (shieldActive) {
                        shieldActive = false;
                        ballY = 330;
                    } else {
                        lives--;
                        sounds.lifeLost();
                        ballX = 200;
                        ballY = 50;
                        respawnDelay = 120;
                        isRespawning = true;
                        if (lives === 0) {
                            sounds.gameOver();
                            alert("GAME OVER!\nFinal Score: " + score + "\nLevel Reached: " + level);
                            location.reload();
                        }
                    }
                }

                // Update secondary balls
                for (let i = balls.length - 1; i >= 0; i--) {
                    let ball = balls[i];
                    ball.x += ball.vx * dt;
                    ball.y += ball.vy * dt;

                    if (ball.x < 10 || ball.x > 390) ball.vx = -ball.vx;
                    if (ball.y < 10) ball.vy = -ball.vy;

                    ball.vy = checkBrickCollision(ball.x, ball.y, ball.vx, ball.vy);

                    if (ball.y > 400) balls.splice(i, 1);
                }

                // Update power-ups
                powerUps = powerUps.filter(p => p.active);
                for (let powerUp of powerUps) {
                    powerUp.update();
                    if (powerUp.checkCollision(paddleX)) {
                        activatePowerUp(powerUp.type);
                        powerUp.active = false;
                    }
                }

                // Update particles
                particles = particles.filter(p => p.life > 0);
                particles.forEach(p => p.update());

                // Screen shake
                const shakeX = screenShake > 0 ? (Math.random() - 0.5) * screenShake : 0;
                const shakeY = screenShake > 0 ? (Math.random() - 0.5) * screenShake : 0;
                if (screenShake > 0) screenShake--;

                ctx.save();
                ctx.translate(shakeX, shakeY);

                // Draw flash
                if (flashIntensity > 0) {
                    ctx.fillStyle = `rgba(255, 0, 255, ${flashIntensity * 0.3})`;
                    ctx.fillRect(0, 0, 400, 400);
                    flashIntensity -= 0.05;
                }

                // Draw bricks
                for (let brick of bricks) brick.draw(ctx);

                // Draw power-ups
                for (let powerUp of powerUps) powerUp.draw(ctx);

                // Draw paddle with shield
                const paddleGradient = ctx.createLinearGradient(paddleX, 360, paddleX, 380);
                if (shieldActive) {
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(paddleX - 10, 350, paddleWidth + 20, 40);
                }

                paddleGradient.addColorStop(0, "#00ffff");
                paddleGradient.addColorStop(1, "#0088ff");
                ctx.fillStyle = paddleGradient;
                ctx.fillRect(paddleX, 360, paddleWidth, 20);
                ctx.shadowColor = "#00ffff";
                ctx.shadowBlur = 15;
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.strokeRect(paddleX, 360, paddleWidth, 20);

                // Draw main ball
                ctx.shadowColor = "#ff00ff";
                ctx.shadowBlur = 20;
                
                ctx.fillStyle = "rgba(255, 0, 255, 0.2)";
                ctx.beginPath();
                ctx.arc(ballX, ballY, 20, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "rgba(255, 0, 255, 0.4)";
                ctx.beginPath();
                ctx.arc(ballX, ballY, 15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "#ff00ff";
                ctx.beginPath();
                ctx.arc(ballX, ballY, 10, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.arc(ballX - 3, ballY - 3, 3, 0, Math.PI * 2);
                ctx.fill();

                // Draw secondary balls
                for (let ball of balls) {
                    ctx.fillStyle = "#ffff00";
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.shadowColor = "transparent";
                ctx.shadowBlur = 0;

                // Draw particles
                particles.forEach(p => p.draw(ctx));

                // Draw UI
                ctx.fillStyle = "#ff00ff";
                ctx.font = "bold 20px Arial";
                ctx.shadowColor = "#ff00ff";
                ctx.shadowBlur = 10;
                ctx.fillText("Score: " + score, 10, 30);
                ctx.fillText("Lives: " + lives, 300, 30);
                ctx.fillText("Level: " + level, 175, 30);
                
                if (slowMoActive > 0) {
                    ctx.fillStyle = "#00ffff";
                    ctx.fillText("SLOW-MO", 10, 50);
                }
                ctx.shadowColor = "transparent";

                if (isRespawning) {
                    ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
                    ctx.fillRect(0, 0, 400, 400);
                    ctx.fillStyle = "#ff00ff";
                    ctx.font = "bold 30px Arial";
                    ctx.shadowColor = "#ff00ff";
                    ctx.shadowBlur = 15;
                    ctx.fillText("GET READY!", 120, 200);
                    ctx.shadowColor = "transparent";
                }

                ctx.restore();

                requestAnimationFrame(update);
            }
            update();
        }
    </script>
</body>
</html>
