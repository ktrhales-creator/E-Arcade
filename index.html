<!DOCTYPE html>
<html>
<head>
    <title>E-ARCADE PORTAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 100;
        }

        /* Animated background grid */
        .grid-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(255, 0, 255, 0.1) 25%, rgba(255, 0, 255, 0.1) 26%, transparent 27%, transparent 74%, rgba(255, 0, 255, 0.1) 75%, rgba(255, 0, 255, 0.1) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, 0.1) 25%, rgba(0, 255, 255, 0.1) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.1) 75%, rgba(0, 255, 255, 0.1) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            animation: gridShift 20s linear infinite;
            z-index: 1;
        }

        @keyframes gridShift {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* Arcade cabinet frame */
        .arcade-cabinet {
            background: linear-gradient(135deg, #1a1f3a 0%, #0d0f1f 100%);
            border: 15px solid #2a2a2a;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 
                0 0 50px rgba(255, 0, 255, 0.6),
                0 0 100px rgba(0, 255, 255, 0.4),
                inset 0 0 30px rgba(255, 0, 255, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.8);
            max-width: 600px;
            animation: cabinetGlow 3s ease-in-out infinite;
        }

        @keyframes cabinetGlow {
            0%, 100% { box-shadow: 
                0 0 50px rgba(255, 0, 255, 0.6),
                0 0 100px rgba(0, 255, 255, 0.4),
                inset 0 0 30px rgba(255, 0, 255, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.8);
            }
            50% { box-shadow: 
                0 0 80px rgba(255, 0, 255, 0.8),
                0 0 150px rgba(0, 255, 255, 0.6),
                inset 0 0 40px rgba(255, 0, 255, 0.2),
                0 20px 60px rgba(0, 0, 0, 0.8);
            }
        }

        .screen {
            background: #000;
            border: 3px solid #00ff88;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 
                0 0 30px rgba(0, 255, 136, 0.5),
                inset 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 3px;
            animation: titleGlow 2s ease-in-out infinite;
            text-shadow: 
                0 0 10px rgba(255, 0, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.6);
            color: #ff00ff;
        }

        @keyframes titleGlow {
            0%, 100% { 
                text-shadow: 
                    0 0 10px rgba(255, 0, 255, 0.8),
                    0 0 20px rgba(0, 255, 255, 0.6);
            }
            50% { 
                text-shadow: 
                    0 0 20px rgba(255, 0, 255, 1),
                    0 0 40px rgba(0, 255, 255, 0.8),
                    0 0 60px rgba(255, 255, 0, 0.6);
            }
        }

        .subtitle {
            font-size: 16px;
            color: #00ffff;
            margin-bottom: 5px;
            letter-spacing: 2px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .status-text {
            font-size: 12px;
            color: #00ff88;
            margin-top: 10px;
            animation: blink 1s step-start infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 35px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #ff00ff;
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.2), rgba(0, 255, 255, 0.2));
            color: #ff00ff;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 20px rgba(255, 0, 255, 0.5),
                inset 0 0 10px rgba(255, 0, 255, 0.1);
            border-radius: 5px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        button:hover {
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.5), rgba(0, 255, 255, 0.5));
            box-shadow: 
                0 0 40px rgba(255, 0, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.6),
                inset 0 0 20px rgba(255, 0, 255, 0.3);
            transform: scale(1.05);
            border-color: #00ffff;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: scale(0.98);
            box-shadow: 
                0 0 20px rgba(255, 0, 255, 0.5),
                inset 0 0 30px rgba(255, 0, 255, 0.3);
        }

        #soundToggle {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 255, 200, 0.2));
            border-color: #00ff88;
            color: #00ff88;
        }

        #soundToggle:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.5), rgba(0, 255, 200, 0.5));
            border-color: #00ffff;
            color: #00ffff;
            box-shadow: 
                0 0 40px rgba(0, 255, 136, 0.8),
                0 0 20px rgba(0, 255, 200, 0.6),
                inset 0 0 20px rgba(0, 255, 136, 0.3);
        }

        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border: 5px solid #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.7);
            background: #000;
        }

        .game-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 21;
        }

        .marquee {
            font-size: 14px;
            color: #ffff00;
            margin-top: 15px;
            letter-spacing: 1px;
            animation: marqueeScroll 4s linear infinite;
        }

        @keyframes marqueeScroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Particle effects */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 5;
        }

        .retro-bezel {
            background: linear-gradient(145deg, #3a3a3a, #1a1a1a);
            border: 8px outset #4a4a4a;
            border-right-color: #0a0a0a;
            border-bottom-color: #0a0a0a;
        }
    </style>
</head>
<body>
    <div class="grid-background"></div>

    <div id="menu" class="container">
        <div class="arcade-cabinet retro-bezel">
            <div class="screen">
                <div class="title">E·ARCADE</div>
                <div class="subtitle">▼ PORTAL ▼</div>
                <div class="status-text">[ READY TO START ]</div>
                <div class="marquee">★ INSERT COIN TO CONTINUE ★</div>
            </div>

            <div class="button-group">
                <button onclick="launchGame()">▶ START GAME</button>
                <button id="soundToggle" onclick="toggleSound()">🔊 SOUND ON</button>
            </div>
        </div>
    </div>

    <div id="gameContainer" style="display: none;">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-ui">
            <button id="soundToggleInGame" onclick="toggleSound()">🔊</button>
            <button onclick="location.reload()">⏹ QUIT</button>
        </div>
    </div>

    <script>
        let soundEnabled = true;
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // Particle generator for background
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * window.innerWidth + 'px';
            particle.style.top = '-10px';
            particle.style.width = '2px';
            particle.style.height = '2px';
            particle.style.background = Math.random() > 0.5 ? '#ff00ff' : '#00ffff';
            particle.style.boxShadow = '0 0 10px currentColor';
            
            document.body.appendChild(particle);
            
            let y = -10;
            const speed = Math.random() * 1 + 0.5;
            const interval = setInterval(() => {
                y += speed;
                particle.style.top = y + 'px';
                particle.style.opacity = 1 - (y / window.innerHeight);
                
                if (y > window.innerHeight) {
                    clearInterval(interval);
                    particle.remove();
                }
            }, 30);
        }

        // Create particles periodically
        setInterval(createParticle, 300);

        const sounds = {
            brickHit: () => playTone(600, 100, 0.3),
            paddleHit: () => playTone(800, 100, 0.3),
            levelComplete: () => playMelody([800, 1000, 1200], 150),
            lifeLost: () => playTone(300, 300, 0.5),
            gameOver: () => playMelody([600, 400, 200], 200)
        };

        function playTone(freq, duration, volume) {
            if (!soundEnabled) return;
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            oscillator.connect(gain);
            gain.connect(audioContext.destination);
            
            oscillator.frequency.value = freq;
            oscillator.type = 'sine';
            
            gain.gain.setValueAtTime(volume, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration / 1000);
        }

        function playMelody(frequencies, noteDuration) {
            if (!soundEnabled) return;
            let time = audioContext.currentTime;
            
            frequencies.forEach(freq => {
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                gain.gain.setValueAtTime(0.3, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + noteDuration / 1000);
                
                oscillator.start(time);
                oscillator.stop(time + noteDuration / 1000);
                
                time += noteDuration / 1000;
            });
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundToggle');
            const btnInGame = document.getElementById('soundToggleInGame');
            const text = soundEnabled ? '🔊' : '🔇';
            if (btn) btn.textContent = text + ' SOUND ' + (soundEnabled ? 'ON' : 'OFF');
            if (btnInGame) btnInGame.textContent = text;
        }

        function launchGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            startEngine();
        }

        function startEngine() {
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");

            const BRICK_COLS = 5;
            const BRICK_HEIGHT = 15;
            const BRICK_PADDING = 5;
            const BRICK_OFFSET_TOP = 30;

            let paddleX = 150, ballX = 200, ballY = 330, speedX = 4, speedY = -4, score = 0, lives = 3;
            let bricks = [];
            let level = 1;
            let respawnDelay = 0;
            let isRespawning = false;
            let particles = [];
            let flashIntensity = 0;

            class Particle {
                constructor(x, y, vx, vy, color) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.color = color;
                    this.life = 30;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.2;
                    this.life--;
                }

                draw(ctx) {
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.life / 30;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            function initBricks() {
                bricks = [];
                const BRICK_ROWS = 3 + level;
                const BRICK_WIDTH = level > 3 ? 60 : 70;
                
                for (let row = 0; row < BRICK_ROWS; row++) {
                    for (let col = 0; col < BRICK_COLS; col++) {
                        if (level > 2 && (row + col) % 3 === 0) continue;
                        
                        bricks.push({
                            x: col * (BRICK_WIDTH + BRICK_PADDING) + 10,
                            y: row * (BRICK_HEIGHT + BRICK_PADDING) + BRICK_OFFSET_TOP,
                            width: BRICK_WIDTH,
                            height: BRICK_HEIGHT,
                            active: true,
                            row: row
                        });
                    }
                }
            }

            initBricks();

            canvas.addEventListener("mousemove", (e) => {
                let rect = canvas.getBoundingClientRect();
                paddleX = e.clientX - rect.left - 50;
                paddleX = Math.max(0, Math.min(paddleX, 300));
            });

            function createParticles(x, y, color, count = 8) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count;
                    const speed = 2 + Math.random() * 3;
                    particles.push(new Particle(
                        x,
                        y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        color
                    ));
                }
            }

            function checkBrickCollision() {
                for (let brick of bricks) {
                    if (!brick.active) continue;

                    if (ballX > brick.x && ballX < brick.x + brick.width &&
                        ballY > brick.y && ballY < brick.y + brick.height) {
                        brick.active = false;
                        speedY = -speedY;
                        score += 10;
                        sounds.brickHit();
                        
                        const colors = ["#00ff00", "#00ffff", "#ff00ff"];
                        createParticles(ballX, ballY, colors[brick.row % 3], 12);
                        flashIntensity = 0.3;

                        if (bricks.every(b => !b.active)) {
                            level++;
                            sounds.levelComplete();
                            alert("LEVEL " + level + "! Score: " + score);
                            initBricks();
                            ballX = 200;
                            ballY = 330;
                            speedX = 4 * (1 + level * 0.1);
                            speedY = -4 * (1 + level * 0.1);
                            isRespawning = false;
                        }
                        return;
                    }
                }
            }

            function update() {
                ctx.clearRect(0, 0, 400, 400);

                if (isRespawning) {
                    respawnDelay--;
                    if (respawnDelay <= 0) {
                        isRespawning = false;
                    }
                }

                if (!isRespawning) {
                    ballX += speedX;
                    ballY += speedY;
                } else {
                    ballY += 1;
                    ballX = 200;
                }

                if (ballX < 10 || ballX > 390) speedX = -speedX;
                if (ballY < 10) speedY = -speedY;

                if (ballY > 350 && ballY < 370 && ballX > paddleX && ballX < paddleX + 100) {
                    speedY = -Math.abs(speedY);
                    const hitPos = (ballX - paddleX) / 100;
                    const angle = (hitPos - 0.5) * 1;
                    speedX = angle * 8;
                    
                    score++;
                    sounds.paddleHit();
                    createParticles(ballX, ballY, "#00ffff", 6);
                    flashIntensity = 0.2;
                    
                    if (score % 5 === 0) { speedX *= 1.05; speedY *= 1.05; }
                }

                if (!isRespawning) {
                    checkBrickCollision();
                }

                if (ballY > 400) {
                    lives--;
                    sounds.lifeLost();
                    ballX = 200;
                    ballY = 50;
                    respawnDelay = 120;
                    isRespawning = true;
                    if (lives === 0) {
                        sounds.gameOver();
                        alert("GAME OVER!\nFinal Score: " + score + "\nLevel Reached: " + level);
                        location.reload();
                    }
                }

                particles = particles.filter(p => p.life > 0);
                particles.forEach(p => p.update());

                if (flashIntensity > 0) {
                    ctx.fillStyle = `rgba(255, 0, 255, ${flashIntensity * 0.3})`;
                    ctx.fillRect(0, 0, 400, 400);
                    flashIntensity -= 0.05;
                }

                for (let brick of bricks) {
                    if (brick.active) {
                        const gradient = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.height);
                        const colors = [
                            ["#00ff00", "#00cc00"],
                            ["#00ffff", "#00cccc"],
                            ["#ff00ff", "#cc00cc"]
                        ];
                        const colorPair = colors[brick.row % 3];
                        gradient.addColorStop(0, colorPair[0]);
                        gradient.addColorStop(1, colorPair[1]);
                        
                        ctx.fillStyle = gradient;
                        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                        
                        ctx.strokeStyle = "#ffffff";
                        ctx.lineWidth = 1;
                        ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
                    }
                }

                const paddleGradient = ctx.createLinearGradient(paddleX, 360, paddleX, 380);
                paddleGradient.addColorStop(0, "#00ffff");
                paddleGradient.addColorStop(1, "#0088ff");
                ctx.fillStyle = paddleGradient;
                ctx.fillRect(paddleX, 360, 100, 20);
                ctx.shadowColor = "#00ffff";
                ctx.shadowBlur = 15;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.strokeRect(paddleX, 360, 100, 20);

                ctx.shadowColor = "#ff00ff";
                ctx.shadowBlur = 20;
                
                ctx.fillStyle = "rgba(255, 0, 255, 0.2)";
                ctx.beginPath();
                ctx.arc(ballX, ballY, 20, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "rgba(255, 0, 255, 0.4)";
                ctx.beginPath();
                ctx.arc(ballX, ballY, 15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "#ff00ff";
                ctx.beginPath();
                ctx.arc(ballX, ballY, 10, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.arc(ballX - 3, ballY - 3, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowColor = "transparent";
                ctx.shadowBlur = 0;

                particles.forEach(p => p.draw(ctx));

                ctx.fillStyle = "#ff00ff";
                ctx.font = "bold 20px Arial";
                ctx.shadowColor = "#ff00ff";
                ctx.shadowBlur = 10;
                ctx.fillText("Score: " + score, 10, 30);
                ctx.fillText("Lives: " + lives, 300, 30);
                ctx.fillText("Level: " + level, 175, 30);
                ctx.shadowColor = "transparent";

                if (isRespawning) {
                    ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
                    ctx.fillRect(0, 0, 400, 400);
                    ctx.fillStyle = "#ff00ff";
                    ctx.font = "bold 30px Arial";
                    ctx.shadowColor = "#ff00ff";
                    ctx.shadowBlur = 15;
                    ctx.fillText("GET READY!", 120, 200);
                    ctx.shadowColor = "transparent";
                }

                requestAnimationFrame(update);
            }
            update();
        }
    </script>
</body>
</html>
