<!DOCTYPE html>
<html>
<head>
    <title>E-Arcade Portal</title>
    <style>
        body { background: #111; color: #ff00ff; text-align: center; font-family: monospace; }
        canvas { border: 4px solid #00ffff; background: #000; cursor: none; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #ff00ff; color: white; border: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>E-ARCADE PORTAL</h1>
        <button onclick="launchGame()">START E-ARCADE</button>
    </div>

    <div id="gameContainer" style="display: none;">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <br>
        <button onclick="location.reload()">QUIT TO MENU</button>
    </div>

    <script>
        function launchGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            startEngine();
        }

        function startEngine() {
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");

            // Game constants
            const BRICK_COLS = 5;
            const BRICK_ROWS = 4;
            const BRICK_WIDTH = 70;
            const BRICK_HEIGHT = 15;
            const BRICK_PADDING = 5;
            const BRICK_OFFSET_TOP = 30;

            let paddleX = 150, ballX = 200, ballY = 330, speedX = 4, speedY = -4, score = 0, lives = 3;
            let bricks = [];

            // Initialize bricks
            function initBricks() {
                bricks = [];
                for (let row = 0; row < BRICK_ROWS; row++) {
                    for (let col = 0; col < BRICK_COLS; col++) {
                        bricks.push({
                            x: col * (BRICK_WIDTH + BRICK_PADDING) + 10,
                            y: row * (BRICK_HEIGHT + BRICK_PADDING) + BRICK_OFFSET_TOP,
                            width: BRICK_WIDTH,
                            height: BRICK_HEIGHT,
                            active: true
                        });
                    }
                }
            }

            initBricks();

            canvas.addEventListener("mousemove", (e) => {
                let rect = canvas.getBoundingClientRect();
                paddleX = e.clientX - rect.left - 50;
            });

            function checkBrickCollision() {
                for (let brick of bricks) {
                    if (!brick.active) continue;

                    if (ballX > brick.x && ballX < brick.x + brick.width &&
                        ballY > brick.y && ballY < brick.y + brick.height) {
                        brick.active = false;
                        speedY = -speedY;
                        score += 10;

                        // Check if all bricks are cleared
                        if (bricks.every(b => !b.active)) {
                            alert("LEVEL COMPLETE! Score: " + score);
                            initBricks();
                            ballX = 200;
                            ballY = 330;
                            speedX = 4;
                            speedY = -4;
                        }
                        return;
                    }
                }
            }

            function update() {
                ctx.clearRect(0, 0, 400, 400);
                ballX += speedX;
                ballY += speedY;

                // Wall collision
                if (ballX < 10 || ballX > 390) speedX = -speedX;
                if (ballY < 10) speedY = -speedY;

                // Paddle collision
                if (ballY > 350 && ballY < 370 && ballX > paddleX && ballX < paddleX + 100) {
                    speedY = -speedY;
                    score++;
                    if (score % 5 === 0) { speedX *= 1.1; speedY *= 1.1; }
                }

                // Brick collision
                checkBrickCollision();

                // Fall off screen
                if (ballY > 400) {
                    lives--;
                    ballX = 200;
                    ballY = 330;
                    if (lives === 0) {
                        alert("GAME OVER! Score: " + score);
                        location.reload();
                    }
                }

                // Draw ball
                ctx.fillStyle = "#ff00ff";
                ctx.beginPath();
                ctx.arc(ballX, ballY, 10, 0, Math.PI * 2);
                ctx.fill();

                // Draw paddle
                ctx.fillStyle = "#00ffff";
                ctx.fillRect(paddleX, 360, 100, 20);

                // Draw bricks
                for (let brick of bricks) {
                    if (brick.active) {
                        ctx.fillStyle = "#00ff00";
                        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                        ctx.strokeStyle = "#00ffff";
                        ctx.lineWidth = 2;
                        ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
                    }
                }

                // Draw UI
                ctx.fillStyle = "white";
                ctx.font = "20px Arial";
                ctx.fillText("Score: " + score, 10, 30);
                ctx.fillText("Lives: " + lives, 300, 30);

                requestAnimationFrame(update);
            }
            update();
        }
    </script>
</body>
</html>
